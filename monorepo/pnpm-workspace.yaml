autoInstallPeers: false
catalogMode: prefer
cleanupUnusedCatalogs: true
dangerouslyAllowAllBuilds: false
dedupePeers: true
enablePrePostScripts: false
engineStrict: true
hoist: false
hoistPattern: []
hoistWorkspacePackages: false
ignoreScripts: true
minimumReleaseAge: 10080
minimumReleaseAgeIgnoreMissingTime: true
minimumReleaseAgeStrict: true
packages:
  - 0-meta/*
  - 1-isomorphic/*
  - 2-engine--winter/*
  - 3-engine--node/*
  - 4-engine--browser/*
  - S-skus/@my-subscriptions/*
publicHoistPattern:
  - tslib
  - turbo
  - "@typescript/native-preview"
  - "@typescript"
  - tsx
  - "*oxlint*"
  - "*oxfmt*"
savePrefix: ^
shamefullyHoist: false
strictPeerDependencies: true
trustPolicy: no-downgrade
trustPolicyIgnoreAfter: 129600
verifyDepsBeforeRun: warn
catalog:
  oxfmt: ^0
  oxlint: ^1
  swr: ^2.4.1
  turbo: ^2
  vader-sentiment: ^1.1.3
minimumReleaseAgeExclude:
  - "@ai-sdk/openai@3.0.67"
  - "@assistant-ui/core@0.2.10"
  - "@assistant-ui/next@0.0.3"
  - "@assistant-ui/react@0.14.14"
  - "@assistant-ui/store@0.2.13"
  - "@assistant-ui/tap@0.5.14"
  - "@assistant-ui/x-generative-compiler@0.0.2"
  - assistant-cloud@0.1.31
  - assistant-stream@0.3.20
  - heat-graph@0.0.10
